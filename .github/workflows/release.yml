name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Tests
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/ssh-frontiere release/ssh-frontiere-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/proof release/proof-linux-x86_64
          chmod 755 release/*
          sha256sum release/* > release/SHA256SUMS
          cat release/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/ssh-frontiere-linux-x86_64
            release/proof-linux-x86_64
            release/SHA256SUMS

[global]
log_file = "/tmp/ssh-frontiere-test/commands.json"
log_level = "info"
default_timeout = 30
default_level = "ops"
mask_sensitive = false
max_stdout_chars = 1024
max_stderr_chars = 512
max_output_chars = 2048

[domains.test]
description = "Test domain"

[domains.test.actions.echo]
description = "Echo test"
level = "read"
timeout = 10
execute = "/bin/echo {domain}"

[domains.test.actions.greet]
description = "Greet with name"
level = "ops"
timeout = 10
execute = "/bin/echo hello {name}"

[domains.test.actions.greet.args]
name = { type = "enum", values = ["world", "user"] }

[domains.test.actions.slow]
description = "Slow command for timeout test"
level = "read"
timeout = 1
execute = "/bin/sleep 10"

[domains.test.actions.fail]
description = "Command that fails"
level = "read"
timeout = 10
execute = "/bin/false"

[domains.test.actions.secret-cmd]
description = "Command with sensitive arg"
level = "ops"
timeout = 10
execute = "/bin/echo {token}"

[domains.test.actions.secret-cmd.args]
token = { type = "string", sensitive = true }

[domains.test.actions.say]
description = "Echo with free text argument"
level = "read"
timeout = 10
execute = "/bin/echo {message}"

[domains.test.actions.say.args]
message = { type = "string" }

[domains.admin]
description = "Admin domain"

[domains.admin.actions.status]
description = "Show status"
level = "ops"
timeout = 10
execute = "/bin/echo ok"
